<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Index Usuarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

    <div th:if="${esComprador && !esVendedor}">
        <div class="min-h-screen bg-gray-100">
            <div th:replace="fragments/sidebarComprador :: sidebarComprador"></div>

            <div class="flex flex-wrap justify-center gap-4 px-4 py-3 bg-white shadow rounded-2xl mx-auto w-fit mb-4">

                <div class="relative">
                    <select class="appearance-none w-48 p-3 pr-10 text-green-800 border border-green-600 rounded-xl shadow-sm focus:outline-none focus:ring-1 focus:ring-green-600 transition">
                        <option selected disabled>Tipo de producto</option>
                        <option>Finca</option>
                        <option>Terreno</option>
                        <option>Ganado</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-green-600">
                        ▼
                    </div>
                </div>

                <div class="relative">
                    <select class="appearance-none w-48 p-3 pr-10 text-green-800 border border-green-600 rounded-xl shadow-sm focus:outline-none focus:ring-1 focus:ring-green-600 transition">
                        <option selected disabled>Ubicación</option>
                        <option>Antioquia</option>
                        <option>Cundinamarca</option>
                        <option>Boyacá</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-green-600">
                        ▼
                    </div>
                </div>

                <div class="relative">
                    <select class="appearance-none w-48 p-3 pr-10 text-green-800 border border-green-600 rounded-xl shadow-sm focus:outline-none focus:ring-1 focus:ring-green-600 transition">
                        <option selected disabled>Precio</option>
                        <option>Menor a mayor</option>
                        <option>Mayor a menor</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-green-600">
                        ▼
                    </div>
                </div>

            </div>

            <section class="p-6">
                <h2 class="text-2xl font-semibold text-green-700 mb-4 text-center mb-8">Productos destacados</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <c:forEach var="p" items="${listaProductos}">
                        <a href="DetalleProducto?idProducto=${p.idProducto}"><div class="bg-white rounded-2xl shadow-md hover:shadow-lg transition hover:scale-105 duration-200 overflow-hidden" onclick="">
                            <img src="${pageContext.request.contextPath}/imagenes/${p.imagenPortada}" class="w-full h-48 object-cover" alt="Producto" />
                            <div class="p-4">
                                <h3 class="text-lg font-semibold text-gray-800">${p.nombreProducto}</h3>
                                <p class="text-green-700 font-bold mt-1">$<fmt:formatNumber value="${p.precioProducto}" type="number" groupingUsed="true"/></p>
                                <p class="text-sm text-gray-600">Ubicación: ${p.ubicacionProducto} | Tipo: ${p.tipoProducto}</p>
                                <div class="flex justify-between items-center mt-3 text-sm">
                                    <button class="text-blue-600 hover:underline">Ver Detalles</button>
                                    <button class="text-red-500 hover:text-red-600">❤️</button>
                                </div>
                            </div>
                        </div></a>
                    </c:forEach>
                </div>
            </section>
        </div>
    </div>
    <h1 th:if="${esVendedor && !esComprador}">VENDEDOR</h1>
    <form th:action="@{/usuarios/logout}" method="post">
        <button type="submit">Logout</button>
    </form>
</body>
</html>
